  <main class="page">
    <div class="term">
      <div class="reveal" aria-hidden="true">
        <div class="term-line">
          <span class="prompt-user">daniel</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-sign-prompt">$</span>
          <span class="cmd">ls -la ./projetos/</span><span class="cursor"></span>

      </div>
