<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat IA — Daniel Hoffmann</title>
  <meta name="description" content="Chat com IA sobre Daniel Hoffmann — experiência, projetos e formação.">
  <meta name="author" content="Daniel Hoffmann">
  <link rel="canonical" href="https://danielhoffmanno.github.io/DanielHoffmannO/chat.html">
  <meta property="og:title" content="Chat IA — Daniel Hoffmann">
  <meta property="og:description" content="Converse com uma IA sobre a experiência profissional de Daniel Hoffmann.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://danielhoffmanno.github.io/DanielHoffmannO/chat.html">
  <meta property="og:image" content="https://danielhoffmanno.github.io/DanielHoffmannO/assets/og-card.svg">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⟩</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - var(--bar-height) - 60px); max-width: var(--max-width); margin: 0 auto; padding: var(--space-lg); }
    .chat-header { margin-bottom: var(--space-lg); }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: var(--space-md); padding: var(--space-md) 0; }
    .chat-msg { max-width: 85%; padding: var(--space-md) var(--space-lg); border-radius: 4px; font-size: var(--font-base); line-height: 1.6; animation: msgIn 0.3s ease; }
    .chat-msg.bot { align-self: flex-start; background: var(--color-green-dim); border: 1px solid var(--color-green-border); color: var(--color-green); }
    .chat-msg.user { align-self: flex-end; background: rgba(0, 188, 212, 0.08); border: 1px solid rgba(0, 188, 212, 0.2); color: var(--color-cyan); }
    .chat-msg.system { align-self: center; color: var(--color-muted); font-size: var(--font-sm); border: none; background: none; }
    .chat-msg strong { color: var(--color-amber); }
    .chat-msg a { color: var(--color-cyan); }
    .chat-typing { align-self: flex-start; padding: var(--space-md) var(--space-lg); color: var(--color-muted); }
    .chat-typing span { display: inline-block; animation: blink 1s infinite; }
    .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
    .chat-suggestions { display: flex; flex-wrap: wrap; gap: var(--space-sm); padding: var(--space-md) 0; }
    .chat-suggestions button { background: var(--color-green-dim); border: 1px solid var(--color-green-border); color: var(--color-green); padding: var(--space-sm) var(--space-md); border-radius: 4px; cursor: pointer; font-family: var(--font-mono); font-size: var(--font-sm); transition: background 0.15s, border-color 0.15s; }
    .chat-suggestions button:hover { background: var(--color-green-border); border-color: var(--color-green); }
    .chat-input-area { display: flex; gap: var(--space-sm); padding-top: var(--space-md); border-top: 1px solid var(--color-border); }
    .chat-input-area input { flex: 1; background: var(--color-bg-dim); border: 1px solid var(--color-border); color: var(--color-green); padding: var(--space-md); border-radius: 4px; font-family: var(--font-mono); font-size: var(--font-base); outline: none; }
    .chat-input-area input:focus { border-color: var(--color-green); }
    .chat-input-area input::placeholder { color: var(--color-muted); }
    .chat-input-area button { background: var(--color-green-dim); border: 1px solid var(--color-green-border); color: var(--color-green); padding: var(--space-md) var(--space-xl); border-radius: 4px; cursor: pointer; font-family: var(--font-mono); font-size: var(--font-base); font-weight: 600; transition: background 0.15s; }
    .chat-input-area button:hover { background: var(--color-green-border); }
    .chat-input-area button:disabled, .chat-input-area input:disabled { opacity: 0.4; cursor: not-allowed; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
  </style>
</head>
<body data-page="chat" data-path="~/chat">
  <noscript>
    <nav style="padding:16px;font-family:monospace">
      <a href="index.html">home</a> | <a href="sobre.html">sobre</a> | <a href="projetos.html">projetos</a> | <a href="certificados.html">certificados</a> | <a href="contato.html">contato</a>
    </nav>
  </noscript>

  <main class="page">
    <div class="chat-container" id="chat-app" style="display:none">
      <div class="chat-header">
        <div class="term-line" aria-hidden="true">
          <span class="prompt-user">daniel</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-colon">:</span><span class="prompt-path">~/chat</span><span class="prompt-sign-prompt">$</span>
          <span class="cmd">./ask-ai --about daniel</span><span class="cursor"></span>
        </div>
      </div>
      <div class="chat-messages" id="messages"></div>
      <div class="chat-suggestions" id="suggestions">
        <button onclick="send('Quais tecnologias ele usa?')">$ tech --stack</button>
        <button onclick="send('Fale sobre a robótica')">$ cat robotica.log</button>
        <button onclick="send('Qual a formação dele?')">$ cat formacao.txt</button>
        <button onclick="send('Quais projetos ele tem?')">$ ls projetos/</button>
      </div>
      <div class="chat-input-area">
        <input type="text" id="input" placeholder="digite sua pergunta..." autocomplete="off">
        <button id="send-btn" onclick="sendInput()">enviar</button>
      </div>
    </div>
  </main>

  <script src="js/bootstrap.js"></script>
  <script>
  (function() {
    const API = 'https://daniel-chat-api.vercel.app/';
    const msgs = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const sugg = document.getElementById('suggestions');
    let count = 0, MAX = 20;

    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 3000);
    fetch(API + 'api/health', { signal: ctrl.signal })
      .then(r => { if (r.ok) return r.json(); throw new Error(); })
      .then(() => {
        document.getElementById('chat-app').style.display = 'flex';
        addMsg('bot', '> Assistente iniciado. Pergunte sobre experiência, projetos ou formação do Daniel.');
      })
      .catch(() => { document.querySelector('.page').innerHTML = '<p style="color:var(--color-muted);padding:40px;text-align:center">Serviço indisponível no momento.</p>'; });

    function addMsg(type, text) {
      const div = document.createElement('div');
      div.className = 'chat-msg ' + type;
      div.innerHTML = type === 'bot' ? fmt(text) : esc(text);
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function fmt(t) {
      return esc(t).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>').replace(/^- (.+)/gm, '• $1').replace(/\n/g, '<br>');
    }

    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'chat-typing'; div.id = 'typing';
      div.innerHTML = '<span>.</span><span>.</span><span>.</span>';
      msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
    }

    function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

    window.send = async function(text) {
      if (count >= MAX) return;
      count++;
      sugg.style.display = 'none';
      addMsg('user', text);

      if (count === MAX - 2) addMsg('system', '// 2 perguntas restantes nesta sessão');
      if (count >= MAX) { addMsg('system', '// limite atingido — recarregue a página'); input.disabled = true; sendBtn.disabled = true; return; }

      showTyping(); input.disabled = true; sendBtn.disabled = true;
      try {
        const r = await fetch(API + 'api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text }) });
        const data = await r.json();
        hideTyping();
        addMsg('bot', data.response || data.error || 'Erro ao obter resposta.');
      } catch { hideTyping(); addMsg('bot', '> erro: falha na conexão. tente novamente.'); }
      input.disabled = false; sendBtn.disabled = false; input.focus();
    };

    window.sendInput = function() { const t = input.value.trim(); if (t) { input.value = ''; send(t); } };
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendInput(); });
  })();
  </script>
</body>
</html>
