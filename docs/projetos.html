  <main class="page">
    <div class="term">
      <div class="reveal" aria-hidden="true">
        <div class="term-line">
          <span class="prompt-user">daniel</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-sign-prompt">$</span>
          <span class="cmd">ls -la ./projetos/</span><span class="cursor"></span>
        </div>
      </div>
      <div class="sep-line" aria-hidden="true"><span class="text-muted"># ============================================</span></div>

      <section aria-label="Filtros de projetos">
        <div class="project-filters reveal" id="projectFilters">
          <button class="filter-btn active" data-lang="all">todos</button>
        </div>
        <div class="project-count reveal" id="projectCount"></div>
      </section>

      <section aria-label="Lista de repositórios GitHub">
        <div class="loading-cursor" id="loadingRepos" role="status" aria-live="polite">fetching repos...</div>
        <div class="error-msg" id="errorRepos" style="display:none" role="alert"></div>
        <div id="repoList"></div>
      </section>
    </div>
