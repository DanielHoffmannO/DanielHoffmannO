<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>~ projetos</title>
  <meta name="description" content="Projetos de Daniel Hoffmann">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="top-bar">
    <div class="prompt-left">
      <span class="user">daniel</span><span class="sep">@</span><span class="host">portfolio</span>
      <span class="sep">:</span><span class="path">~/projetos</span>
    </div>
    <nav class="top-bar-nav">
      <a href="Home.html">home</a>
      <a href="sobre.html">sobre</a>
      <a href="projetos.html" class="active">projetos</a>
      <a href="contato.html">contato</a>
    </nav>
    <button class="menu-btn" id="menuBtn">menu</button>
  </header>

  <nav class="side-nav" id="sideNav">
    <a href="Home.html">home</a>
    <a href="sobre.html">sobre</a>
    <a href="projetos.html" class="active">projetos</a>
    <a href="contato.html">contato</a>
  </nav>

  <main class="page">
    <div class="term">

      <!-- Command -->
      <div class="reveal r0">
        <div class="term-line">
          <span class="prompt-user">daniel</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-sign-prompt">$</span>
          <span class="cmd">ls -la ./projetos/ &amp;&amp; git log --oneline</span>
          <span class="cursor"></span>
        </div>
        <div class="sep-line"><span style="color:var(--muted);">─────────────────────────────────────────────</span></div>
      </div>

      <!-- Loading -->
      <div class="loading-cursor" id="loadingRepos">
        <span>fetching repos from <span style="color:var(--green);"></span></span>
        <span>...</span>
      </div>

      <!-- Error -->
      <div class="error-msg" id="errorRepos" style="display:none;"></div>

      <!-- Repo list -->
      <div id="repoList"></div>

    </div>
  </main>

  <footer class="footer">© 2026 — Daniel Hoffmann</footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
